services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-llama3.2}"]
    restart: "no"

  ollama-pull-gemma4:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull gemma4:26b"]
    restart: "no"

  devpilot:
    image: ghcr.io/chaebin-park/devpilot:latest
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEVPILOT_BROWSE_ROOT=/host-home
    volumes:
      - devpilot-config:/root/.devpilot
      - ${HOME}:/host-home
    command: ["--web"]
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      ollama-pull-gemma4:
        condition: service_completed_successfully

volumes:
  ollama-data:
  devpilot-config:
